# pytest.ini
[pytest]
# Путь к корню проекта
pythonpath = .

# Настройки
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции запуска
addopts = 
    -v
    --strict-markers
    --tb=short
    --maxfail=1
    --disable-warnings

# Маркеры
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
